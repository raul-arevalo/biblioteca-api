spring:
  application:
    name: biblioteca-api

  datasource:
    url: jdbc:postgresql://localhost:5432/biblioteca_bd
    username: postgres
    password: 1287
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update

    show-sql: true

    properties:
      hibernate:
        format_sql: true

    database-platform: org.hibernate.dialect.PostgreSQLDialect

server:
  port: 8080

springdoc:
  swagger-ui:
    path: /swagger

  api-docs:
    path: /api-docs